- name: Create app group
  ansible.builtin.group:
    name: "{{ app_group }}"
    system: true

- name: Create app user
  ansible.builtin.user:
    name: "{{ app_user }}"
    group: "{{ app_group }}"
    system: true
    create_home: false
    shell: /usr/sbin/nologin

- name: Create app directory
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0755"

- name: Copy app.py
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../app/src/app.py"
    dest: "{{ app_dir }}/app.py"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0644"
  notify: Restart app service

- name: Copy requirements.txt
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../app/requirements.txt"
    dest: "{{ app_dir }}/requirements.txt"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0644"

- name: Create templates directory
  ansible.builtin.file:
    path: "{{ app_dir }}/templates"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0755"

- name: Copy HTML templates
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../app/src/templates/"
    dest: "{{ app_dir }}/templates/"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0644"
  notify: Restart app service

- name: Create virtualenv
  ansible.builtin.command:
    cmd: "python3 -m venv {{ app_dir }}/.venv"
    creates: "{{ app_dir }}/.venv/bin/python"

- name: Install Python dependencies
  ansible.builtin.pip:
    requirements: "{{ app_dir }}/requirements.txt"
    virtualenv: "{{ app_dir }}/.venv"

- name: Deploy environment file
  ansible.builtin.template:
    src: app.env.j2
    dest: "{{ app_dir }}/app.env"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0640"
  notify: Restart app service

- name: Deploy systemd service
  ansible.builtin.template:
    src: flask-app.service.j2
    dest: "/etc/systemd/system/{{ app_name }}.service"
    mode: "0644"
  notify:
    - Reload systemd
    - Restart app service

- name: Ensure app service is enabled and started
  ansible.builtin.systemd:
    name: "{{ app_name }}"
    enabled: true
    state: started
